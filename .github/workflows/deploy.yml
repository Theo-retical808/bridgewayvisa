name: Deploy to GitHub Pages

on:
  push:
    branches: [ver-2.0-release]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bridgewayvisa-react/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: bridgewayvisa-react

      - name: Copy assets to public folder
        run: cp -r ../assets ./public/assets
        working-directory: bridgewayvisa-react

      - name: Build
        run: npm run build
        working-directory: bridgewayvisa-react

      - name: Copy CNAME to dist
        run: cp ../CNAME ./dist/CNAME
        working-directory: bridgewayvisa-react

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: bridgewayvisa-react/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
